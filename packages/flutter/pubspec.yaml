name: rejourney
description: Privacy-first Flutter session replay for iOS and Android with masking, crash and ANR reporting, network timing, and product analytics.
version: 0.1.0
homepage: https://rejourney.co
documentation: https://rejourney.co/docs/flutter/overview
repository: https://github.com/rejourneyco/rejourney/tree/main/packages/flutter
issue_tracker: https://github.com/rejourneyco/rejourney/issues
topics:
  - session-replay
  - observability
  - analytics
  - crash-reporting
  - monitoring
screenshots:
  - description: Rejourney Flutter example with native session controls and privacy-safe capture features.
    path: screenshots/flutter-session-replay-example.png

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: co.rejourney.rejourney
        pluginClass: RejourneyPlugin
      ios:
        pluginClass: RejourneyPlugin
