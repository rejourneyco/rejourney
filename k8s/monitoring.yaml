# Monitoring configuration
#
# Uptime Kuma has been replaced by:
#   - Gatus        (k8s/gatus.yaml)          HTTP + TLS endpoint checks
#   - Pushgateway  (k8s/pushgateway.yaml)     Worker heartbeat pushes
#   - VictoriaMetrics (k8s/victoria-metrics.yaml) + Grafana (k8s/grafana.yaml)
#
# This file retains only the monitoring-tokens Secret for the debug-token
# used by the API /health/debug endpoint.

---
# Secret for monitoring tokens
# debug-token: used by API /health/debug endpoint (requires DEBUG_HEALTH_TOKEN env var)
#   Generate with: openssl rand -hex 32
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-tokens
  namespace: rejourney
type: Opaque
stringData:
  debug-token: "REPLACE_WITH_SECURE_DEBUG_TOKEN"
