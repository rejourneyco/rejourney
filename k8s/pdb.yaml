# Pod Disruption Budgets
# Ensures kubectl drain / node maintenance never takes down all pods of critical services simultaneously.
# Requires at least 1 pod to remain available during voluntary disruptions.

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-pdb
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ingest-upload-pdb
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ingest-upload

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: replay-worker-pdb
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: replay-worker
