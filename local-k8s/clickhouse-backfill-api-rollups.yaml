---
# Manual local ClickHouse rollup rebuild for API endpoint analytics.
apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-backfill-api-rollups
  namespace: rejourney-local
  labels:
    app.kubernetes.io/component: clickhouse-backfill
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 1
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-clickhouse
          image: curlimages/curl:8.11.1
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for ClickHouse to be ready..."
              until curl -fsS http://clickhouse:8123/ping >/dev/null; do
                echo "ClickHouse not ready, waiting 5s..."
                sleep 5
              done
              echo "ClickHouse is ready."
      containers:
        - name: backfill
          image: rejourney-local/migration:dev
          imagePullPolicy: IfNotPresent
          command: ["node", "--import", "tsx", "scripts/backfillClickHouseApiEndpointRollups.ts", "--replace"]
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              value: postgresql://unused:unused@localhost:5432/unused
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET
            - name: INGEST_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: INGEST_HMAC_SECRET
            - name: CLICKHOUSE_ENABLED
              value: "true"
            - name: CLICKHOUSE_DUAL_WRITE_ENABLED
              value: "false"
            - name: CLICKHOUSE_READS_ENABLED
              value: "false"
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_URL
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DATABASE
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_DATABASE
            - name: CLICKHOUSE_REQUEST_TIMEOUT_MS
              value: "60000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
